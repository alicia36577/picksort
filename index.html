<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PICKSORT — 중복 사진 분류기</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0b0a;--bg2:#141210;--bg3:#1e1c1a;--accent:#c9b99a;
  --text:#e8e4dc;--text2:#7a736c;--text3:#4a4540;
  --green:#5dcaa5;--gbg:#0d1a12;--red:#e07070;--rbg:#1a0d0d;
  --border:#2a2826;
  --mono:'DM Mono',monospace;--serif:'DM Serif Display',Georgia,serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;}
.wrap{max-width:860px;margin:0 auto;padding:48px 24px 80px;}
header{text-align:center;margin-bottom:48px;}
.logo{font-family:var(--serif);font-size:40px;color:var(--text);letter-spacing:.04em;margin-bottom:8px;}
.logo b{color:var(--accent);font-weight:400;}
.tagline{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--text2);}

/* 드롭존 */
.dropzone{
  border:1px dashed var(--border);border-radius:4px;
  background:var(--bg2);margin-bottom:10px;
  min-height:140px;cursor:pointer;
  transition:border-color .2s,background .2s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;padding:24px;
}
.dropzone:hover,.dropzone.over{border-color:var(--accent);background:#181511;}
.dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.dropzone.has-files input{position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;}
.drop-hint{text-align:center;pointer-events:none;}
.drop-icon{font-size:28px;color:var(--text3);margin-bottom:8px;}
.drop-title{font-size:13px;color:var(--text2);margin-bottom:3px;}
.drop-sub{font-size:11px;color:var(--text3);}
.thumbs{display:flex;flex-wrap:wrap;gap:8px;width:100%;}
.thumb{width:72px;height:54px;border-radius:3px;object-fit:cover;border:1px solid var(--border);}

.file-count{font-size:11px;color:var(--text3);margin-bottom:20px;}

/* 슬라이더 */
.sliders{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
@media(max-width:520px){.sliders{grid-template-columns:1fr;}}
.sf label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);margin-bottom:6px;}
.sr{display:flex;align-items:center;gap:10px;}
input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer;}
.sv{font-size:13px;color:var(--accent);width:36px;text-align:right;}
.sd{font-size:10px;color:var(--text3);margin-top:4px;}

/* 버튼 */
#runBtn{
  width:100%;padding:15px;background:var(--accent);color:#0a0908;
  border:none;border-radius:3px;font-family:var(--mono);font-size:13px;
  font-weight:500;letter-spacing:.12em;cursor:pointer;transition:opacity .2s;margin-bottom:28px;
}
#runBtn:hover{opacity:.88;}
#runBtn:disabled{opacity:.4;cursor:not-allowed;}

/* 진행 */
#pw{display:none;margin-bottom:24px;}
.pb-bg{background:var(--bg3);border-radius:2px;height:3px;overflow:hidden;}
.pb{height:100%;background:var(--accent);width:0;transition:width .25s;border-radius:2px;}
.pl{font-size:11px;color:var(--text2);margin-top:8px;}

/* 요약 */
#summary{display:none;margin-bottom:24px;}
.stat-row{display:flex;gap:10px;margin-bottom:12px;}
.stat{flex:1;padding:16px 10px;text-align:center;border-radius:3px;border:1px solid var(--border);background:var(--bg2);}
.sn{font-family:var(--serif);font-size:32px;display:block;}
.sl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);margin-top:2px;}
.stat.sk{border-color:#2a4035;background:var(--gbg);}
.stat.sd2{border-color:#3d2020;background:var(--rbg);}
.stat.sk .sn{color:var(--green);}
.stat.sd2 .sn{color:var(--red);}
.smsg{padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:3px;font-size:12px;color:var(--text2);line-height:1.6;}

/* 결과 */
#rs{display:none;}
.sec-title{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);margin:24px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--bg3);}
.rlist{display:flex;flex-direction:column;gap:2px;}
.rc{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:3px;border:1px solid transparent;animation:fi .3s ease both;}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.rc.keep{background:var(--gbg);border-color:#1a3328;}
.rc.rm{background:var(--rbg);border-color:#2e1515;}
.ct{width:64px;height:48px;object-fit:cover;border-radius:2px;flex-shrink:0;border:1px solid var(--border);}
.ci{flex:1;min-width:0;}
.badge{display:inline-block;font-size:10px;font-weight:500;letter-spacing:.1em;padding:2px 8px;border-radius:20px;margin-bottom:4px;}
.badge.best{background:var(--accent);color:#0a0908;}
.badge.single{background:#3a4d3d;color:var(--green);}
.badge.del{background:#3d1f1f;color:var(--red);}
.cn{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cr{font-size:11px;color:var(--text2);margin-top:2px;}
.csc{font-size:11px;color:var(--text3);white-space:nowrap;}
.dlb{display:inline-block;padding:5px 11px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:var(--mono);font-size:11px;border-radius:2px;cursor:pointer;text-decoration:none;transition:border-color .15s,color .15s;white-space:nowrap;}
.dlb:hover{border-color:var(--accent);color:var(--accent);}
#dlAll{display:none;width:100%;padding:13px;background:var(--bg2);border:1px solid var(--border);color:var(--accent);font-family:var(--mono);font-size:12px;border-radius:3px;cursor:pointer;letter-spacing:.1em;transition:border-color .2s;margin-top:18px;}
#dlAll:hover{border-color:var(--accent);}
.err{padding:13px 15px;background:var(--rbg);border:1px solid #3d2020;border-radius:3px;color:var(--red);font-size:12px;margin-bottom:14px;display:none;line-height:1.5;}
.ct{cursor:zoom-in;}
.ct:hover{opacity:.82;transition:opacity .15s;}
#modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.88);align-items:center;justify-content:center;padding:20px;}
#modal.open{display:flex;}
#modal-inner{position:relative;max-width:min(90vw,900px);max-height:90vh;display:flex;flex-direction:column;align-items:center;gap:12px;}
#modal-img{max-width:100%;max-height:calc(90vh - 80px);object-fit:contain;border-radius:4px;border:1px solid var(--border);display:block;}
#modal-info{font-size:11px;color:var(--text2);letter-spacing:.04em;text-align:center;}
#modal-close{position:fixed;top:20px;right:24px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-family:var(--mono);font-size:18px;width:36px;height:36px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s,color .15s;}
#modal-close:hover{border-color:var(--accent);color:var(--accent);}
#modal-nav{position:fixed;top:50%;transform:translateY(-50%);width:calc(100% - 0px);display:flex;justify-content:space-between;padding:0 16px;pointer-events:none;left:0;}
.modal-arr{pointer-events:all;background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-family:var(--mono);font-size:16px;width:36px;height:60px;border-radius:3px;cursor:pointer;transition:border-color .15s,color .15s;}
.modal-arr:hover{border-color:var(--accent);color:var(--accent);}
.modal-arr:disabled{opacity:.25;cursor:not-allowed;}

/* 추천 박스 */
#rec{display:none;margin-bottom:20px;border:1px solid #2e2a1f;border-radius:4px;background:#141008;overflow:hidden;}
.rec-header{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;border-bottom:1px solid #2e2a1f;}
.rec-title{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);}
.rec-analyzing{font-size:11px;color:var(--text3);}
.rec-body{padding:14px 15px;display:flex;flex-direction:column;gap:10px;}
.rec-row{display:flex;align-items:flex-start;gap:12px;}
.rec-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);width:110px;flex-shrink:0;padding-top:2px;}
.rec-val{font-family:var(--serif);font-size:22px;color:var(--accent);line-height:1;margin-right:8px;}
.rec-desc{font-size:11px;color:var(--text2);line-height:1.5;}
.rec-apply{display:block;width:100%;margin-top:4px;padding:10px;background:none;border:1px solid #3a3020;border-radius:3px;color:var(--accent);font-family:var(--mono);font-size:11px;letter-spacing:.1em;cursor:pointer;transition:border-color .15s,background .15s;}
.rec-apply:hover{border-color:var(--accent);background:#1e1a0e;}
.rec-spinner{display:inline-block;width:10px;height:10px;border:1.5px solid var(--text3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">PICK<b>✦</b>SORT</div>
    <p class="tagline">API 없는 중복 사진 분류기 · 브라우저에서 직접 실행</p>
  </header>

  <div class="dropzone" id="dz">
    <input type="file" id="fi" multiple accept="image/jpeg,image/png,image/webp,image/bmp">
    <div class="drop-hint" id="dh">
      <div class="drop-icon">⊕</div>
      <p class="drop-title">사진을 끌어다 놓거나 클릭해서 선택</p>
      <p class="drop-sub">JPG · PNG · WEBP · BMP</p>
    </div>
    <div class="thumbs" id="th"></div>
  </div>
  <div class="file-count" id="fc"></div>

  <div id="rec">
    <div class="rec-header">
      <span class="rec-title">✦ &nbsp;추천 설정값</span>
      <span class="rec-analyzing" id="rec-status"><span class="rec-spinner"></span>사진 분석 중…</span>
    </div>
    <div class="rec-body" id="rec-body" style="display:none;">
      <div class="rec-row">
        <span class="rec-label">흔들림 기준값</span>
        <div>
          <span class="rec-val" id="rec-bv">—</span>
          <div class="rec-desc" id="rec-bd"></div>
        </div>
      </div>
      <div class="rec-row">
        <span class="rec-label">유사도 거리</span>
        <div>
          <span class="rec-val" id="rec-hv">—</span>
          <div class="rec-desc" id="rec-hd"></div>
        </div>
      </div>
      <button class="rec-apply" id="rec-apply">↑ &nbsp;슬라이더에 추천값 적용</button>
    </div>
  </div>
  <div class="sliders">
    <div class="sf">
      <label>흔들림 기준값 (Blur Threshold)</label>
      <div class="sr"><input type="range" id="bs" min="100" max="30000" value="1000"><span class="sv" id="bv">1000</span></div>
      <div class="sd">낮을수록 엄격하게 흔들림 판정</div>
    </div>
    <div class="sf">
      <label>유사도 거리 (Hash Threshold)</label>
      <div class="sr"><input type="range" id="hs" min="1" max="30" value="10"><span class="sv" id="hv">10</span></div>
      <div class="sd">높을수록 넓게 중복 인식</div>
    </div>
  </div>

  <div class="err" id="err"></div>
  <button id="runBtn" disabled>✦ &nbsp;분류 시작</button>

  <div id="pw">
    <div class="pb-bg"><div class="pb" id="pb"></div></div>
    <div class="pl" id="pl">준비 중…</div>
  </div>

  <div id="summary">
    <div class="stat-row">
      <div class="stat"><span class="sn" id="s0">0</span><div class="sl">전체</div></div>
      <div class="stat sk"><span class="sn" id="s1">0</span><div class="sl">저장</div></div>
      <div class="stat sd2"><span class="sn" id="s2">0</span><div class="sl">삭제</div></div>
      <div class="stat"><span class="sn" id="s3">0</span><div class="sl">그룹</div></div>
    </div>
    <div class="smsg" id="smsg"></div>
  </div>

  <div id="rs">
    <div class="sec-title" id="kt">저장 사진</div>
    <div class="rlist" id="kl"></div>
    <div class="sec-title" id="dt">삭제 사진</div>
    <div class="rlist" id="dl2"></div>
    <button id="dlAll">↓ &nbsp;저장 사진 전체 다운로드</button>
  </div>
</div>

<div id="modal">
  <div id="modal-inner">
    <img id="modal-img" src="" alt="">
    <div id="modal-info"></div>
  </div>
  <button id="modal-close">✕</button>
  <div id="modal-nav">
    <button class="modal-arr" id="modal-prev">‹</button>
    <button class="modal-arr" id="modal-next">›</button>
  </div>
</div>

<script>
// ─── 상수 ───────────────────────────────────────────
const BRT_MIN=40, BRT_MAX=220;

// ─── 파일 → base64 dataURL ───────────────────────────
function readFileAsDataURL(file){
  return new Promise((ok,ng)=>{
    const r=new FileReader();
    r.onload=e=>ok(e.target.result);
    r.onerror=()=>ng(new Error('읽기 실패: '+file.name));
    r.readAsDataURL(file);
  });
}

// ─── dataURL → ImageData (canvas) ───────────────────
function dataURLtoImageData(dataURL, maxDim=400){
  return new Promise((ok,ng)=>{
    const img=new Image();
    img.onload=()=>{
      try{
        const scale=Math.min(maxDim/img.width, maxDim/img.height, 1);
        const w=Math.max(1,Math.round(img.width*scale));
        const h=Math.max(1,Math.round(img.height*scale));
        const c=document.createElement('canvas');
        c.width=w; c.height=h;
        const ctx=c.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        ok(ctx.getImageData(0,0,w,h));
      }catch(e){ng(e);}
    };
    img.onerror=()=>ng(new Error('이미지 디코딩 실패'));
    img.src=dataURL;
  });
}

// ─── dHash (파이썬 imagehash.dhash 동일 로직) ────────
function dhash(imgData, sz=8){
  const w=sz+1, h=sz;
  const px=resizeGray(imgData,w,h);
  let hash=0n, bit=0n;
  for(let r=0;r<h;r++)
    for(let c=0;c<sz;c++){
      if(px[r*w+c]>px[r*w+c+1]) hash|=(1n<<bit);
      bit++;
    }
  return hash;
}
function hamming(a,b){let x=a^b,c=0;while(x){c+=Number(x&1n);x>>=1n;}return c;}
function resizeGray(src,dw,dh){
  const{data:d,width:sw,height:sh}=src;
  const out=new Float32Array(dw*dh);
  const g=i=>0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
  for(let y=0;y<dh;y++) for(let x=0;x<dw;x++){
    const sx=(x/dw)*sw, sy=(y/dh)*sh;
    const x0=Math.floor(sx), y0=Math.floor(sy);
    const x1=Math.min(x0+1,sw-1), y1=Math.min(y0+1,sh-1);
    const dx=sx-x0, dy=sy-y0;
    const p00=g((y0*sw+x0)*4), p10=g((y0*sw+x1)*4);
    const p01=g((y1*sw+x0)*4), p11=g((y1*sw+x1)*4);
    out[y*dw+x]=p00*(1-dx)*(1-dy)+p10*dx*(1-dy)+p01*(1-dx)*dy+p11*dx*dy;
  }
  return out;
}

// ─── 라플라시안 분산 (선명도) ─────────────────────────
function lapVar(imgData){
  const{data:d,width:w,height:h}=imgData;
  const g=new Float32Array(w*h);
  for(let i=0;i<w*h;i++) g[i]=0.299*d[i*4]+0.587*d[i*4+1]+0.114*d[i*4+2];
  const lap=new Float32Array(w*h);
  for(let y=1;y<h-1;y++) for(let x=1;x<w-1;x++){
    const i=y*w+x;
    lap[i]=-g[i-w-1]-g[i-w]-g[i-w+1]-g[i-1]+8*g[i]-g[i+1]-g[i+w-1]-g[i+w]-g[i+w+1];
  }
  const mean=lap.reduce((a,b)=>a+b,0)/lap.length;
  return lap.reduce((a,b)=>a+(b-mean)**2,0)/lap.length;
}

// ─── 밝기 ─────────────────────────────────────────────
function brightness(imgData){
  const{data:d}=imgData; let sum=0, n=d.length/4;
  for(let i=0;i<d.length;i+=4) sum+=Math.max(d[i]/255,d[i+1]/255,d[i+2]/255);
  return (sum/n)*255;
}


// ─── 추천값 분석 ─────────────────────────────────────────
async function analyzeRecommend(arr, urls){
  const recEl=document.getElementById('rec');
  const recStatus=document.getElementById('rec-status');
  const recBody=document.getElementById('rec-body');
  recEl.style.display='block';
  recBody.style.display='none';
  recStatus.innerHTML='<span class="rec-spinner"></span>사진 분석 중…';

  // 샘플 최대 30장 (속도)
  const sample=arr.length>30
    ? arr.map((_,i)=>i).sort(()=>Math.random()-.5).slice(0,30)
    : arr.map((_,i)=>i);

  const blurs=[], hashes=[];
  for(const i of sample){
    await tick();
    const imgData=await dataURLtoImageData(urls[i], 800);
    blurs.push(lapVar(imgData));
    hashes.push(dhash(imgData));
  }

  // 선명도 분포 분석
  const sorted=[...blurs].sort((a,b)=>a-b);
  const med=sorted[Math.floor(sorted.length/2)];
  const p25=sorted[Math.floor(sorted.length*0.25)];
  const p75=sorted[Math.floor(sorted.length*0.75)];

  const maxBlur = sorted[sorted.length - 1];
  const minBlur = sorted[0];

  // 전략: 가장 선명한 사진의 60%를 기준선으로 사용
  // → 최고 품질 대비 40% 이상 떨어지는 사진은 흔들림으로 판정
  // 단, 모든 사진이 비슷하게 흔들렸을 때(범위가 좁을 때)는
  //   기준을 낮춰서 억울하게 전부 삭제되지 않도록 중앙값 * 0.6으로 fallback
  let recBlur;
  const spreadRatio = maxBlur > 0 ? (maxBlur - minBlur) / maxBlur : 0;
  if(spreadRatio > 0.3){
    // 품질 차이가 뚜렷한 묶음 → 최댓값 60% 기준
    recBlur = Math.round(maxBlur * 0.6);
  } else {
    // 품질이 고른 묶음 → 중앙값 60% 기준 (너무 엄격하지 않게)
    recBlur = Math.round(med * 0.6);
  }
  recBlur = Math.max(100, Math.min(30000, recBlur));

  // 해밍 거리 분포 분석 (샘플 쌍)
  const dists=[];
  for(let i=0;i<hashes.length;i++)
    for(let j=i+1;j<hashes.length;j++)
      dists.push(hamming(hashes[i],hashes[j]));

  let recHash=10;
  if(dists.length>0){
    const ds=[...dists].sort((a,b)=>a-b);
    // 하위 5% 거리 (매우 유사한 쌍들의 최대거리)를 기준으로
    const p5=ds[Math.max(0,Math.floor(ds.length*0.05))];
    // 하위 5%가 0이면 5, 아니면 p5+2 (여유 포함)
    recHash=Math.max(1,Math.min(30, p5===0 ? 5 : p5+2));
  }

  // 설명 문구
  const blurDesc=(()=>{
    const q = maxBlur < 1500 ? '전체적으로 흔들린 묶음'
            : maxBlur < 5000 ? '보통 수준 묶음'
            : maxBlur < 15000? '선명한 사진 포함'
            : '고품질 사진 포함';
    return `선명도 최대 ${maxBlur.toFixed(0)} · 중앙값 ${med.toFixed(0)} · ${q}`;
  })();

  const dupRatio=dists.length>0
    ? (dists.filter(d=>d<=recHash).length/dists.length*100).toFixed(0) : 0;
  const hashDesc=`유사 쌍 약 ${dupRatio}% 감지 · `+
    (recHash<=5?'중복 판정 엄격':recHash<=12?'중복 판정 보통':'중복 판정 넓게');

  document.getElementById('rec-bv').textContent=recBlur;
  document.getElementById('rec-bd').textContent=blurDesc;
  document.getElementById('rec-hv').textContent=recHash;
  document.getElementById('rec-hd').textContent=hashDesc;

  // 분석 완료 즉시 슬라이더에 자동 적용
  bs.value=recBlur; bv.textContent=recBlur;
  hs.value=recHash; hv_el.textContent=recHash;

  recStatus.textContent='분석 완료 · 자동 적용됨';
  recBody.style.display='flex';

  // 적용 버튼 (수동 재적용용)
  document.getElementById('rec-apply').onclick=()=>{
    bs.value=recBlur; bv.textContent=recBlur;
    hs.value=recHash; hv_el.textContent=recHash;
    document.getElementById('rec-apply').textContent='✓ &nbsp;적용됨';
    setTimeout(()=>{document.getElementById('rec-apply').textContent='↑ &nbsp;슬라이더에 추천값 적용';},1500);
  };
}

// ─── Union-Find 그룹핑 ────────────────────────────────
function groupBy(items, thr){
  const p=new Map(items.map(it=>[it,it]));
  const find=x=>{while(p.get(x)!==x){p.set(x,p.get(p.get(x)));x=p.get(x);}return x;};
  const union=(a,b)=>{const ra=find(a),rb=find(b);if(ra!==rb)p.set(rb,ra);};
  for(let i=0;i<items.length;i++)
    for(let j=i+1;j<items.length;j++)
      if(hamming(items[i].hash,items[j].hash)<=thr) union(items[i],items[j]);
  const m=new Map();
  for(const it of items){const r=find(it);if(!m.has(r))m.set(r,[]);m.get(r).push(it);}
  return[...m.values()];
}

// ─── UI 요소 ──────────────────────────────────────────
const dz=document.getElementById('dz');
const fi=document.getElementById('fi');
const th=document.getElementById('th');
const dh_el=document.getElementById('dh');
const fc=document.getElementById('fc');
const runBtn=document.getElementById('runBtn');
const bs=document.getElementById('bs');
const hs=document.getElementById('hs');
const bv=document.getElementById('bv');
const hv_el=document.getElementById('hv');
const pw=document.getElementById('pw');
const pb=document.getElementById('pb');
const pl=document.getElementById('pl');
const summary=document.getElementById('summary');
const kl=document.getElementById('kl');
const dl2=document.getElementById('dl2');
const rs=document.getElementById('rs');
const dlAll=document.getElementById('dlAll');
const err=document.getElementById('err');

let files=[], dataURLs=[], keepItems=[];

bs.oninput=()=>bv.textContent=bs.value;
hs.oninput=()=>hv_el.textContent=hs.value;

dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');load(e.dataTransfer.files);});
fi.addEventListener('change',()=>{if(fi.files.length)load(fi.files);});

async function load(fileList){
  const arr=[...fileList].filter(f=>f.type.startsWith('image/'));
  if(!arr.length)return;
  files=arr; dataURLs=[]; th.innerHTML='';
  dz.classList.remove('has-files');
  document.getElementById('rec').style.display='none';
  dh_el.style.display='none';
  err.style.display='none';
  summary.style.display='none';
  rs.style.display='none';
  dlAll.style.display='none';
  keepItems=[];

  // base64로 읽어서 썸네일 표시
  for(const f of arr){
    const url=await readFileAsDataURL(f);
    dataURLs.push(url);
    const img=document.createElement('img');
    img.className='thumb'; img.src=url; img.alt=f.name;
    th.appendChild(img);
  }
  fc.textContent=`${arr.length}장 선택됨 (클릭해서 변경)`;
  runBtn.disabled=false;
  dz.classList.add('has-files');
  analyzeRecommend(arr, dataURLs);
}

// 썸네일 표시 후 드롭존 클릭 시 파일 선택창 열기
dz.addEventListener('click', e=>{
  if(dz.classList.contains('has-files') && e.target!==fi){
    fi.click();
  }
});

runBtn.addEventListener('click', run);

async function run(){
  if(!files.length)return;
  runBtn.disabled=true;
  err.style.display='none';
  pw.style.display='block';
  summary.style.display='none';
  rs.style.display='none';
  dlAll.style.display='none';
  kl.innerHTML=''; dl2.innerHTML=''; keepItems=[];

  const blurThr=parseFloat(bs.value);
  const hashThr=parseInt(hs.value);
  const total=files.length;

  try{
    // 1단계: ImageData + hash
    const items=[];
    for(let i=0;i<total;i++){
      prog(5+Math.round((i/total)*40), `해시 계산 중… ${i+1}/${total}`);
      await tick();
      const imgData=await dataURLtoImageData(dataURLs[i], 800);
      const hash=dhash(imgData);
      items.push({file:files[i], dataURL:dataURLs[i], imgData, hash});
    }

    prog(50,'중복 그룹 분석 중…'); await tick();

    // 2단계: 그룹핑
    const groups=groupBy(items, hashThr);

    // 3단계: 품질 평가 + 분류
    // 전체 사진 선명도 먼저 계산
    const allScored = items.map(it=>score(it, blurThr));
    // 전체 최고 선명도 (단독 사진 판단 기준용)
    const globalMax = Math.max(...allScored.map(s=>s.blur));

    const kept=[], deleted=[];
    for(let g=0;g<groups.length;g++){
      prog(50+Math.round((g/groups.length)*45),`품질 평가 중… ${g+1}/${groups.length}그룹`);
      await tick();
      const grp=groups[g];
      // 이미 계산된 score 재사용 (items 인덱스로 매핑)
      const sc=grp.map(it=>{
        const idx=items.indexOf(it);
        return allScored[idx];
      }).sort((a,b)=>b.quality-a.quality);
      const best=sc[0];
      const groupMax=best.blur;

      if(grp.length===1){
        // 단독 사진: 전체 최고 선명도 대비 상대 비교
        // globalMax 대비 25% 미만이면 흔들림으로 판정
        const isBlurryGlobal = best.blur < globalMax * 0.25;
        if(isBlurryGlobal){
          deleted.push({...best, rtype:'삭제', reason:`흔들림 · 선명도 ${best.blur.toFixed(0)}`});
        } else if(best.badExp){
          deleted.push({...best, rtype:'삭제', reason:`노출불량 · 밝기 ${best.brt.toFixed(0)}`});
        } else {
          kept.push({...best, rtype:'단독', reason:'중복 없음 → 저장'});
        }
      } else {
        // 그룹 사진: 그룹 내 상대 비교
        // 그룹 베스트도 전체 최고 대비 25% 미만이면 그룹 전원 흔들림
        const bestBlurryGlobal = best.blur < globalMax * 0.25;
        if(bestBlurryGlobal){
          for(const s of sc){
            deleted.push({...s, rtype:'삭제', reason:`흔들림(전원) · 선명도 ${s.blur.toFixed(0)}`});
          }
        } else {
          kept.push({...best, rtype:'베스트', reason:`선명도 ${best.blur.toFixed(0)} · 베스트컷`});
          for(const s of sc.slice(1)){
            // 그룹 베스트 대비 55% 미만이면 흔들림
            if(isBlurryRelative(s.blur, groupMax)){
              deleted.push({...s, rtype:'삭제', reason:`흔들림 · 선명도 ${s.blur.toFixed(0)}`});
            } else if(s.badExp){
              deleted.push({...s, rtype:'삭제', reason:`노출불량 · 밝기 ${s.brt.toFixed(0)}`});
            } else {
              deleted.push({...s, rtype:'삭제', reason:`저품질(중복) · 선명도 ${s.blur.toFixed(0)}`});
            }
          }
        }
      }
    }

    prog(100,'완료!');
    keepItems=kept;
    allResults=[...kept,...deleted];

    // 요약 표시
    document.getElementById('s0').textContent=total;
    document.getElementById('s1').textContent=kept.length;
    document.getElementById('s2').textContent=deleted.length;
    document.getElementById('s3').textContent=groups.length;
    document.getElementById('smsg').textContent=
      `${groups.length}개 그룹 — 베스트컷 ${kept.filter(c=>c.rtype==='베스트').length}장, `+
      `단독 ${kept.filter(c=>c.rtype==='단독').length}장 저장 / 삭제 ${deleted.length}장`;
    summary.style.display='block';

    document.getElementById('kt').textContent=`저장 사진 (${kept.length}장)`;
    document.getElementById('dt').textContent=`삭제 사진 (${deleted.length}장)`;
    kept.forEach((c,i)=>card(kl,c,i*35,i));
    deleted.forEach((c,i)=>card(dl2,c,i*35,kept.length+i));
    rs.style.display='block';
    dlAll.style.display='block';

  }catch(e){
    err.textContent='오류: '+e.message;
    err.style.display='block';
  }finally{
    setTimeout(()=>{pw.style.display='none'; runBtn.disabled=false;},500);
  }
}

function score(item, blurThr){
  const blur=lapVar(item.imgData);
  const brt=brightness(item.imgData);
  const badExp=brt<BRT_MIN||brt>BRT_MAX;
  // isBlurry: 전역 절대 기준 (단독 사진 판단용)
  return{file:item.file, dataURL:item.dataURL, blur, brt,
         isBlurry:blur<blurThr, badExp, quality:blur*(badExp?.5:1)};
}

// 그룹 내 상대 비교로 흔들림 판단
// 그룹 최고 선명도 대비 RELATIVE_THR 미만이면 흔들림
const RELATIVE_THR = 0.55; // 그룹 내 베스트 대비 55% 미만 → 삭제
function isBlurryRelative(blur, groupMaxBlur){
  return blur < groupMaxBlur * RELATIVE_THR;
}

function card(container, c, delay, globalIdx){
  const isKeep=c.rtype!=='삭제';
  const div=document.createElement('div');
  div.className=`rc ${isKeep?'keep':'rm'}`;
  div.style.animationDelay=delay+'ms';
  const bc=c.rtype==='베스트'?'best':c.rtype==='단독'?'single':'del';
  const bt=c.rtype==='베스트'?'✦ 베스트':c.rtype==='단독'?'◈ 단독':'✕ 삭제';
  div.innerHTML=`
    <img class="ct" src="${c.dataURL}" alt="${c.file.name}" onclick="openModal(allResults, ${globalIdx})">
    <div class="ci">
      <span class="badge ${bc}">${bt}</span>
      <div class="cn">${c.file.name}</div>
      <div class="cr">${c.reason}</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;">
      <div class="csc">밝기 ${c.brt.toFixed(0)}</div>
      ${isKeep?`<a class="dlb" href="${c.dataURL}" download="${c.file.name}">↓ 저장</a>`:''}
    </div>`;
  container.appendChild(div);
}

dlAll.addEventListener('click',()=>{
  keepItems.forEach(c=>{
    const a=document.createElement('a');
    a.href=c.dataURL; a.download=c.file.name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  });
});

function prog(pct,msg){pb.style.width=pct+'%'; pl.textContent=msg;}
function tick(){return new Promise(r=>setTimeout(r,0));}

// ─── 모달 ─────────────────────────────────────────────
let modalItems=[], modalIdx=0;

function openModal(items, idx){
  modalItems=items; modalIdx=idx;
  renderModal();
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
}
function renderModal(){
  const c=modalItems[modalIdx];
  document.getElementById('modal-img').src=c.dataURL;
  document.getElementById('modal-img').alt=c.file.name;
  document.getElementById('modal-info').textContent=
    `${c.file.name}  ·  선명도 ${c.blur.toFixed(0)}  ·  밝기 ${c.brt.toFixed(0)}  ·  ${modalIdx+1} / ${modalItems.length}`;
  document.getElementById('modal-prev').disabled=(modalIdx===0);
  document.getElementById('modal-next').disabled=(modalIdx===modalItems.length-1);
}
document.getElementById('modal-close').onclick=closeModal;
document.getElementById('modal-prev').onclick=()=>{if(modalIdx>0){modalIdx--;renderModal();}};
document.getElementById('modal-next').onclick=()=>{if(modalIdx<modalItems.length-1){modalIdx++;renderModal();}};
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
document.addEventListener('keydown',e=>{
  const m=document.getElementById('modal');
  if(!m.classList.contains('open'))return;
  if(e.key==='Escape')closeModal();
  if(e.key==='ArrowLeft'&&modalIdx>0){modalIdx--;renderModal();}
  if(e.key==='ArrowRight'&&modalIdx<modalItems.length-1){modalIdx++;renderModal();}
});

// allResults: kept+deleted를 순서대로 보관
let allResults=[];
</script>
